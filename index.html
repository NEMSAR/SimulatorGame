<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FOODCHECK | Control de Calidad</title>
    <style>
        /* === VARIABLES PREMIUM === */
        :root {
            --accent: #ff4757; /* Rojo elegante, inspirado en la imagen de referencia */
            --accent-glow: rgba(255, 71, 87, 0.4);
            --success: #2ed573;
            --success-glow: rgba(46, 213, 115, 0.4);
            --text-main: #f1f2f6;
            --text-muted: #a4b0be;
            --glass-bg: rgba(20, 20, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* === FONDO Y AMBIENTACIÓN === */
        body {
            /* Fondo de alimentos oscuro y elegante simulando la referencia */
            background: 
                linear-gradient(to bottom, rgba(10, 10, 12, 0.7), rgba(10, 10, 12, 0.95)),
                url('https://images.unsplash.com/photo-1498837167386-41801c402120?auto=format&fit=crop&q=80&w=1080') center/cover fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding: 20px 15px;
        }

        /* Efecto de luz ambiental animada de fondo */
        .ambient-light {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            animation: breathe 8s ease-in-out infinite alternate;
        }

        @keyframes breathe {
            0% { opacity: 0.3; transform: translateX(-50%) scale(0.8); }
            100% { opacity: 0.7; transform: translateX(-50%) scale(1.2); }
        }

        /* === PANEL PRINCIPAL GLASSMORPHISM === */
        .glass-panel {
            width: 100%;
            max-width: 480px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 var(--glass-highlight);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            margin-bottom: 80px; /* Espacio para el FAB */
        }

        /* === HEADER Y LOGO === */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 40px;
            margin-bottom: 15px;
        }

        .logo-placeholder {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 3px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo-placeholder span {
            color: var(--accent);
            font-weight: bold;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a4b0be 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 600;
            animation: pulseText 3s infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--accent-glow); }
        }

        /* === VISTAS DE JUEGO === */
        .game-view {
            display: none;
            width: 100%;
            animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .game-view.active { display: block; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === MÓDULO 1: MEMOTEST 3D === */
        .memo-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            perspective: 1200px;
        }

        .memo-card {
            width: 100%;
            aspect-ratio: 1 / 1.25;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .memo-card.flipped { transform: rotateY(180deg); }
        .memo-card.matched {
            transform: rotateY(180deg) scale(0.9);
            opacity: 0.5;
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px;
            text-align: center;
        }

        .card-front {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 0 var(--glass-highlight);
            font-size: 28px;
            transition: all 0.3s ease;
        }

        .memo-card:active .card-front {
            background: rgba(255, 255, 255, 0.08);
        }

        .card-back {
            background: linear-gradient(135deg, rgba(46, 213, 115, 0.1), rgba(46, 213, 115, 0.02));
            border: 1px solid var(--success);
            box-shadow: 0 0 15px var(--success-glow);
            transform: rotateY(180deg);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-icon { font-size: 24px; margin-bottom: 6px; }

        /* === MÓDULO 2: SIMULADOR PREMIUM === */
        .insp-display {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            font-size: 17px;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text-main);
            margin-bottom: 25px;
            position: relative;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.5);
        }

        .insp-progress {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px var(--accent-glow);
        }

        .insp-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            font-size: 15px;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-action::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: translateX(-100%);
            transition: 0.5s;
        }

        .btn-action:active { transform: scale(0.97); }

        .insp-feedback {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            min-height: 40px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .insp-feedback.show { opacity: 1; }

        /* === PANTALLAS DE VICTORIA === */
        .victory-screen {
            display: none;
            text-align: center;
            padding: 20px 0;
            animation: fadeSlideUp 0.6s;
        }

        .victory-title {
            font-size: 28px;
            color: var(--success);
            margin-bottom: 10px;
            text-shadow: 0 0 20px var(--success-glow);
        }

        .btn-restart {
            margin-top: 25px;
            padding: 16px 32px;
            background: var(--text-main);
            color: #000;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(255,255,255,0.15);
        }

        .btn-restart:active { transform: translateY(2px); }

        /* === BOTÓN FLOTANTE (FAB) === */
        .fab {
            position: fixed;
            bottom: 40px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            box-shadow: 0 15px 25px rgba(0,0,0,0.5), inset 0 1px 0 var(--glass-highlight);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .fab:active { transform: scale(0.85) rotate(15deg); }

        /* === FOOTER AGENCY === */
        footer {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
            z-index: 0;
        }

        footer span {
            color: rgba(255,255,255,0.6);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="glass-panel">
        <header class="header">
            <div class="logo-container">
                <!-- INSERTA TU LOGO AQUÍ -->
                <!-- <img src="TU_LOGO.png" alt="Logo" style="height: 100%;"> -->
                <div class="logo-placeholder">FOOD<span>CHECK</span></div>
            </div>
            <h1 class="title">Control de Calidad</h1>
            <div class="subtitle" id="module-title">Módulo: Memoria Visual</div>
        </header>

        <!-- VISTA 1: MEMOTEST 3D -->
        <section id="view-memotest" class="game-view active">
            <div class="memo-board" id="memo-board"></div>
            <div class="victory-screen" id="memo-victory">
                <h2 class="victory-title">¡Análisis Exitoso!</h2>
                <p style="color: var(--text-muted);">Has emparejado correctamente los estándares del mercado.</p>
                <button class="btn-restart" onclick="initMemotest()">Nuevo Análisis</button>
            </div>
        </section>

        <!-- VISTA 2: SIMULADOR INSPECTOR -->
        <section id="view-inspector" class="game-view">
            <div id="insp-gameplay">
                <div class="insp-display" id="insp-display">
                    <div class="insp-progress" id="insp-progress">LOTE 1/6</div>
                    <span id="insp-text">Cargando muestra...</span>
                </div>
                <div class="insp-actions" id="insp-actions"></div>
                <div class="insp-feedback" id="insp-feedback"></div>
            </div>
            <div class="victory-screen" id="insp-victory">
                <h2 class="victory-title" style="color: var(--accent); text-shadow: 0 0 20px var(--accent-glow);">Turno Finalizado</h2>
                <p id="insp-final-msg" style="color: var(--text-muted);"></p>
                <button class="btn-restart" onclick="initInspector()">Siguiente Turno</button>
            </div>
        </section>
    </div>

    <button class="fab" onclick="toggleGame()" title="Cambiar Módulo">
        ⚗️
    </button>

    <footer>
        Powered by <span>NovaBit Media Agency</span>
    </footer>

    <script>
        // --- CONTROLADOR DE MÓDULOS ---
        let currentMode = 'memotest';
        const viewMemo = document.getElementById('view-memotest');
        const viewInsp = document.getElementById('view-inspector');
        const moduleTitle = document.getElementById('module-title');
        const ambient = document.querySelector('.ambient-light');

        function toggleGame() {
            if (currentMode === 'memotest') {
                currentMode = 'inspector';
                viewMemo.classList.remove('active');
                viewInsp.classList.add('active');
                moduleTitle.innerText = "Módulo: Inspección Rápida";
                ambient.style.background = "radial-gradient(circle, var(--accent-glow) 0%, transparent 70%)";
                initInspector();
            } else {
                currentMode = 'memotest';
                viewInsp.classList.remove('active');
                viewMemo.classList.add('active');
                moduleTitle.innerText = "Módulo: Memoria Visual";
                ambient.style.background = "radial-gradient(circle, var(--success-glow) 0%, transparent 70%)";
                initMemotest();
            }
        }

        // --- LÓGICA MEMOTEST ---
        // Basado en Documento: Capacitación. Frutas y hortalizas.docx
        const memoData = [
            { id: 1, text: "Frutillas y Uvas", icon: "🍓" }, { id: 1, text: "Requieren Refrigeración", icon: "❄️" },
            { id: 2, text: "Banana o Papa", icon: "🍌" }, { id: 2, text: "Temperatura Ambiente", icon: "🌡️" },
            { id: 3, text: "Primera Calidad", icon: "⭐" }, { id: 3, text: "Apto Venta Directa", icon: "🛒" },
            { id: 4, text: "Tercera Calidad", icon: "⚠️" }, { id: 4, text: "Industria o Descarte", icon: "🗑️" },
            { id: 5, text: "Transporte", icon: "🚚" }, { id: 5, text: "Limpio y Cerrado", icon: "🧼" },
            { id: 6, text: "Contaminación", icon: "🦠" }, { id: 6, text: "Afecta Producto Sano", icon: "❌" }
        ];

        let hasFlippedCard = false, lockBoard = false, firstCard, secondCard, memoMatches = 0;

        function initMemotest() {
            const board = document.getElementById('memo-board');
            document.getElementById('memo-victory').style.display = 'none';
            board.style.display = 'grid';
            board.innerHTML = '';
            memoMatches = 0;
            [hasFlippedCard, lockBoard, firstCard, secondCard] = [false, false, null, null];

            let shuffled = [...memoData].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('memo-card');
                card.dataset.id = data.id;
                card.innerHTML = `
                    <div class="card-face card-front">🌿</div>
                    <div class="card-face card-back">
                        <div class="card-icon">${data.icon}</div>
                        <div>${data.text}</div>
                    </div>
                `;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
            ambient.style.background = "radial-gradient(circle, var(--success-glow) 0%, transparent 70%)";
        }

        function flipCard() {
            if (lockBoard || this === firstCard) return;
            this.classList.add('flipped');
            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }
            secondCard = this;
            checkMemoMatch();
        }

        function checkMemoMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            if (isMatch) {
                setTimeout(() => {
                    firstCard.classList.add('matched');
                    secondCard.classList.add('matched');
                    resetMemoBoard();
                    memoMatches += 2;
                    if (memoMatches === memoData.length) {
                        document.getElementById('memo-board').style.display = 'none';
                        document.getElementById('memo-victory').style.display = 'block';
                    }
                }, 500);
            } else {
                lockBoard = true;
                setTimeout(() => {
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    resetMemoBoard();
                }, 1200);
            }
        }

        function resetMemoBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // --- LÓGICA SIMULADOR ---
        // Basado en Documento: Capacitación. Frutas y hortalizas.docx
        const inspItems = [
            { text: "Lote de frutillas y uvas recién recibidas en el abasto.", options: ["A Refrigeración", "A Temp. Ambiente"], correct: 0, exp: "Requieren refrigeración para conservar calidad." },
            { text: "Lote de manzanas de tamaño homogéneo y color brillante.", options: ["Primera Calidad", "Tercera Calidad"], correct: 0, exp: "Clasifican para venta directa." },
            { text: "Hortalizas con daños visibles o sobremaduración extrema.", options: ["Segunda Calidad", "Descarte o Industria"], correct: 1, exp: "La tercera calidad no es apta para venta directa." },
            { text: "Llega transporte con mercadería; el camión está abierto y sucio.", options: ["Aceptar Carga", "Rechazar Carga"], correct: 1, exp: "El transporte debe ser limpio y cerrado." },
            { text: "Se colocan verduras junto a frutas que liberan mucho etileno.", options: ["Correcto", "Incorrecto (Incompatible)"], correct: 1, exp: "Genera maduración acelerada y deterioro cruzado." },
            { text: "Lote de bananas y papas ingresando al depósito.", options: ["A Refrigeración", "A Temp. Ambiente"], correct: 1, exp: "Se conservan mejor a temperatura ambiente." }
        ];

        let currentInsp = 0, inspScore = 0, inspActive = true;

        function initInspector() {
            document.getElementById('insp-gameplay').style.display = 'block';
            document.getElementById('insp-victory').style.display = 'none';
            currentInsp = 0;
            inspScore = 0;
            loadInspItem();
        }

        function loadInspItem() {
            if (currentInsp >= inspItems.length) {
                endInspector();
                return;
            }
            const item = inspItems[currentInsp];
            document.getElementById('insp-text').innerText = item.text;
            document.getElementById('insp-progress').innerText = `LOTE ${currentInsp + 1}/${inspItems.length}`;
            
            const feedback = document.getElementById('insp-feedback');
            feedback.classList.remove('show');
            
            const actionsDiv = document.getElementById('insp-actions');
            actionsDiv.innerHTML = '';
            item.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = opt;
                btn.onclick = () => checkInspAnswer(index, btn);
                actionsDiv.appendChild(btn);
            });
            inspActive = true;
        }

        function checkInspAnswer(index, btnSelected) {
            if (!inspActive) return;
            inspActive = false;
            
            const item = inspItems[currentInsp];
            const btns = document.querySelectorAll('.btn-action');
            const feedback = document.getElementById('insp-feedback');

            if (index === item.correct) {
                btnSelected.style.background = "rgba(46, 213, 115, 0.2)";
                btnSelected.style.borderColor = "var(--success)";
                feedback.innerHTML = `<span style="color:var(--success)">✓ Criterio Aprobado:</span> ${item.exp}`;
                inspScore++;
            } else {
                btnSelected.style.background = "rgba(255, 71, 87, 0.2)";
                btnSelected.style.borderColor = "var(--accent)";
                btns[item.correct].style.borderColor = "var(--success)";
                feedback.innerHTML = `<span style="color:var(--accent)">✗ Criterio Rechazado:</span> ${item.exp}`;
            }
            
            feedback.classList.add('show');

            setTimeout(() => {
                currentInsp++;
                loadInspItem();
            }, 3000);
        }

        function endInspector() {
            document.getElementById('insp-gameplay').style.display = 'none';
            document.getElementById('insp-victory').style.display = 'block';
            document.getElementById('insp-final-msg').innerText = `Precisión: ${inspScore} de ${inspItems.length} lotes clasificados con éxito.`;
        }

        // Iniciar
        initMemotest();
    </script>
</body>
</html>
