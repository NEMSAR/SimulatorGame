<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Inspector del Mercado</title>
    <style>
        :root {
            --primary: #f57c00;
            --secondary: #ffe0b2;
            --success: #4caf50;
            --danger: #f44336;
            --info: #2196f3;
            --text: #333;
            --bg: #eceff1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            text-align: center;
        }
        h1 {
            color: var(--primary);
            font-size: 22px;
            margin-bottom: 5px;
        }
        p.subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .card {
            background-color: var(--secondary);
            border: 2px dashed var(--primary);
            border-radius: 10px;
            padding: 30px 20px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            background-color: white;
            color: var(--text);
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover, .btn:active {
            background-color: #f5f5f5;
            transform: scale(0.98);
        }
        .feedback {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 25px;
        }
        .correct { color: var(--success); }
        .incorrect { color: var(--danger); }
        #end-screen { display: none; }
        .btn-restart {
            background-color: var(--primary);
            color: white;
            border: none;
            width: 100%;
            margin-top: 20px;
            grid-column: span 2;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="game-screen">
        <h1>🔍 Inspector de Abasto</h1>
        <p class="subtitle" id="progress">Lote 1 de 6</p>
        
        <div class="card" id="item-card">
            Cargando lote...
        </div>

        <div class="actions" id="action-buttons">
            <!-- Botones generados dinámicamente -->
        </div>

        <div class="feedback" id="feedback-text"></div>
    </div>

    <div id="end-screen">
        <h1>¡Turno finalizado!</h1>
        <p>Has clasificado todos los lotes.</p>
        <h2 id="final-score"></h2>
        <p id="final-message"></p>
        <button class="btn btn-restart" onclick="startGame()">Volver a trabajar</button>
    </div>
</div>

<script>
    // Base de datos de situaciones sacadas de la capacitación
    const items = [
        {
            text: "Llegan cajones de frutillas y uvas frescas.",
            options: ["A la heladera (Refrigeración)", "Al galpón (Temp. Ambiente)"],
            correct: 0,
            explanation: "Las frutillas y uvas necesitan refrigeración."
        },
        {
            text: "Llegan cajones de bananas y bolsas de papa.",
            options: ["A la heladera (Refrigeración)", "Al galpón (Temp. Ambiente)"],
            correct: 1,
            explanation: "Se conservan mejor a temperatura ambiente."
        },
        {
            text: "Lote de manzanas con tamaño perfecto, gran color y aptas para venta directa.",
            options: ["Primera Calidad", "Tercera Calidad"],
            correct: 0,
            explanation: "La primera calidad es ideal para venta directa."
        },
        {
            text: "Hortalizas con pequeños detalles, ideales para consumo inmediato o menor precio.",
            options: ["Segunda Calidad", "Descarte"],
            correct: 0,
            explanation: "La segunda calidad es para consumo inmediato."
        },
        {
            text: "Tomates muy golpeados y con signos de deterioro avanzado.",
            options: ["Primera Calidad", "Tercera Calidad / Descarte"],
            correct: 1,
            explanation: "Van a industria o descarte por su mal estado."
        },
        {
            text: "Llega un camión abierto, sucio y con mercadería expuesta al sol.",
            options: ["Aceptar y descargar", "Rechazar mercadería"],
            correct: 1,
            explanation: "El transporte debe garantizar vehículos limpios y cerrados."
        }
    ];

    let currentItem = 0;
    let score = 0;
    let gameActive = true;

    const itemCard = document.getElementById('item-card');
    const actionButtons = document.getElementById('action-buttons');
    const feedbackText = document.getElementById('feedback-text');
    const progressText = document.getElementById('progress');
    const gameScreen = document.getElementById('game-screen');
    const endScreen = document.getElementById('end-screen');
    const finalScore = document.getElementById('final-score');
    const finalMessage = document.getElementById('final-message');

    function startGame() {
        currentItem = 0;
        score = 0;
        gameActive = true;
        gameScreen.style.display = 'block';
        endScreen.style.display = 'none';
        feedbackText.innerText = '';
        loadItem();
    }

    function loadItem() {
        if (currentItem >= items.length) {
            endGame();
            return;
        }

        const item = items[currentItem];
        itemCard.innerText = item.text;
        progressText.innerText = `Lote ${currentItem + 1} de ${items.length}`;
        feedbackText.innerText = '';
        
        actionButtons.innerHTML = '';
        item.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index);
            actionButtons.appendChild(btn);
        });
        
        gameActive = true;
    }

    function checkAnswer(selectedIndex) {
        if (!gameActive) return;
        gameActive = false; // Prevenir múltiples clics

        const item = items[currentItem];
        const buttons = actionButtons.children;

        if (selectedIndex === item.correct) {
            buttons[selectedIndex].style.borderColor = "var(--success)";
            buttons[selectedIndex].style.backgroundColor = "#e8f5e9";
            feedbackText.innerHTML = `<span class="correct">¡Bien hecho!</span> ${item.explanation}`;
            score++;
        } else {
            buttons[selectedIndex].style.borderColor = "var(--danger)";
            buttons[selectedIndex].style.backgroundColor = "#ffebee";
            buttons[item.correct].style.borderColor = "var(--success)";
            feedbackText.innerHTML = `<span class="incorrect">Error.</span> ${item.explanation}`;
        }

        setTimeout(() => {
            currentItem++;
            loadItem();
        }, 3000); // Muestra la explicación por 3 segundos antes de pasar
    }

    function endGame() {
        gameScreen.style.display = 'none';
        endScreen.style.display = 'block';
        finalScore.innerText = `Puntaje: ${score} / ${items.length}`;
        
        if (score === items.length) {
            finalMessage.innerText = "¡Excelente inspector! Dominás los procesos de recepción y clasificación a la perfección.";
        } else if (score >= items.length / 2) {
            finalMessage.innerText = "Buen trabajo, pero algunos lotes se te pasaron. ¡A seguir practicando!";
        } else {
            finalMessage.innerText = "Hubo muchas pérdidas por mala clasificación. Repasemos el manual y volvamos a intentarlo.";
        }
    }

    // Iniciar el juego al cargar la página
    startGame();
</script>

</body>
</html>
