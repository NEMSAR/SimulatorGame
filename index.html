<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONEXIÓN ABASTO // EL DESAFÍO</title>
    <style>
        /* CONFIGURACIÓN BRUTALISTA */
        :root {
            --bg: #fff;
            --primary: #00ff66; /* Verde Neón */
            --secondary: #00ffff; /* Cian Neón */
            --accent: #ff0055; /* Rosa Neón */
            --dark: #000000;
            --card-front-bg: #ffe600; /* Amarillo Brutal */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Black', 'Impact', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* FONTO ANIMADO INTERACTIVO */
        body {
            background-color: #fafafa;
            background-image: radial-gradient(var(--dark) 15%, transparent 16%);
            background-size: 24px 24px;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
            animation: backgroundMove 4s linear infinite;
        }

        @keyframes backgroundMove {
            0% { background-position: 0 0; }
            100% { background-position: 24px 24px; }
        }

        /* HEADER TOTALMENTE LLAMATIVO */
        header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 450px;
        }

        /* Animación en bucle tipo pulso/glitch brutalista */
        .marquee-title {
            background: var(--dark);
            color: var(--primary);
            padding: 12px;
            font-size: 26px;
            text-transform: uppercase;
            border: 4px solid var(--dark);
            box-shadow: 6px 6px 0px var(--accent);
            transform: rotate(-2deg);
            animation: titlePulse 2s infinite alternate cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes titlePulse {
            0% { transform: rotate(-2deg) scale(0.98); box-shadow: 6px 6px 0px var(--accent); }
            100% { transform: rotate(1deg) scale(1.02); box-shadow: -6px 6px 0px var(--secondary); }
        }

        .subtitle {
            background: var(--bg);
            color: var(--dark);
            display: inline-block;
            margin-top: 12px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: bold;
            border: 3px solid var(--dark);
            box-shadow: 4px 4px 0px var(--dark);
            transform: rotate(1deg);
        }

        /* TABLERO DE JUEGO OPTIMIZADO PARA MÓVILES */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 450px;
            width: 100%;
            perspective: 1000px;
            margin-bottom: 20px;
        }

        /* TARJETAS RÍGIDAS CON SOMBRAS DURAS */
        .card {
            width: 100%;
            aspect-ratio: 1 / 1.15;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Evita el lag de toque en móviles */
        .card * { pointer-events: none; }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg) scale(0.92);
            opacity: 0.4;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 4px solid var(--dark);
            border-radius: 0px; /* Estilo brutalista: bordes rectos y agresivos */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px;
            text-align: center;
        }

        /* Frente de la tarjeta */
        .card-front {
            background: var(--card-front-bg);
            box-shadow: 4px 4px 0px var(--dark);
            font-size: 32px;
        }

        .card:active .card-front {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--dark);
        }

        /* Dorso de la tarjeta revelado */
        .card-back {
            transform: rotateY(180deg);
            font-size: 11px;
            font-weight: 900;
            line-height: 1.2;
            background: var(--secondary);
            box-shadow: -4px 4px 0px var(--dark);
        }

        .card-back .emoji-inside {
            font-size: 24px;
            margin-bottom: 4px;
        }

        /* CONFIGURACIONES DE COLOR SEGÚN PAR ACCERTADO */
        .p1 { background-color: #ff99f1 !important; } /* Frutillas */
        .p2 { background-color: #ffdf79 !important; } /* Bananas */
        .p3 { background-color: #9bf6ff !important; } /* Primera */
        .p4 { background-color: #ffadad !important; } /* Tercera */
        .p5 { background-color: #caffbf !important; } /* Transporte */
        .p6 { background-color: #fdffb6 !important; } /* Contaminación */

        /* PANTALLA DE VICTORIA BRUTALISTA */
        .victory-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--accent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
            border: 10px solid var(--dark);
        }

        .victory-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        .victory-box {
            background: #fff;
            border: 6px solid var(--dark);
            padding: 30px 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 10px 10px 0px var(--dark);
            transform: rotate(-1deg);
        }

        .btn-restart {
            margin-top: 25px;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: var(--dark);
            border: 4px solid var(--dark);
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 5px 5px 0px var(--dark);
        }

        .btn-restart:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px var(--dark);
        }
    </style>
</head>
<body>

    <header>
        <div class="marquee-title">💥 CONTROL DE ABASTO 💥</div>
        <div class="subtitle">CONECTÁ LOS PARES DE LA CADENA ANTES QUE SE DETERIOREN</div>
    </header>

    <div class="game-board" id="board">
        </div>

    <div class="victory-screen" id="victory">
        <div class="victory-box">
            <h1 style="-webkit-text-fill-color: initial; font-size: 36px; margin-bottom: 10px;">¡TURNO COMPLETO!</h1>
            <p style="color: var(--dark); font-size: 16px; font-weight: bold;">Clasificaste y resguardaste la mercadería con éxito absoluto.</p>
            <button class="btn-restart" onclick="initGame()">VOLVER A EMPEZAR</button>
        </div>
    </div>

    <script>
        // Datos estructurados en pares exactos basados en el documento técnico
        const cardData = [
            { id: 1, text: "Frutillas y Uvas", emoji: "🍓🍇", class: "p1" },
            { id: 1, text: "Requieren Refrigeración", emoji: "❄️", class: "p1" },
            
            { id: 2, text: "Banana o Papa", emoji: "🍌🥔", class: "p2" },
            { id: 2, text: "Temperatura Ambiente", emoji: "🌡️", class: "p2" },
            
            { id: 3, text: "Primera Calidad", emoji: "🌟", class: "p3" },
            { id: 3, text: "Aptos Venta Directa", emoji: "🛒", class: "p3" },
            
            { id: 4, text: "Tercera Calidad", emoji: "⚠️", class: "p4" },
            { id: 4, text: "Industria o Descarte", emoji: "🏭", class: "p4" },
            
            { id: 5, text: "Transporte Ideal", emoji: "🚚", class: "p5" },
            { id: 5, text: "Vehículo Limpio y Cerrado", emoji: "🧼", class: "p5" },
            
            { id: 6, text: "Contaminación Cruzada", emoji: "🦠", class: "p6" },
            { id: 6, text: "Afecta a Productos Sanos", emoji: "❌", class: "p6" }
        ];

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchesFound = 0;

        const board = document.getElementById('board');
        const victoryScreen = document.getElementById('victory');

        function shuffle() {
            cardData.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            board.innerHTML = '';
            shuffle();
            
            cardData.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = data.id;

                card.innerHTML = `
                    <div class="card-face card-front">
                        <span>📦</span>
                    </div>
                    <div class="card-face card-back ${data.class}">
                        <div class="emoji-inside">${data.emoji}</div>
                        <div>${data.text}</div>
                    </div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            setTimeout(() => {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                resetBoard();
                
                matchesFound += 2;
                if (matchesFound === cardData.length) {
                    setTimeout(() => victoryScreen.classList.add('active'), 400);
                }
            }, 300);
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function initGame() {
            matchesFound = 0;
            victoryScreen.classList.remove('active');
            resetBoard();
            createBoard();
        }

        initGame();
    </script>
</body>
</html>
