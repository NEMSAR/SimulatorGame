<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Control de Inocuidad</title>
    <style>
        /* ESTÉTICA CLEAN LAB / CIENTÍFICA */
        :root {
            --bg-app: #f4f7f6;
            --surface: #ffffff;
            --primary: #0284c7; /* Azul Médico/Científico */
            --primary-light: #e0f2fe;
            --success: #10b981; /* Verde Bioseguridad */
            --success-light: #d1fae5;
            --danger: #ef4444; /* Rojo Alerta */
            --danger-light: #fee2e2;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* HEADER & LOGO */
        header {
            width: 100%;
            background: var(--surface);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 10;
        }

        .logo-container {
            margin-bottom: 10px;
            height: 50px; /* Ajusta la altura según tu logo */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            max-height: 100%;
            object-fit: contain;
        }

        /* Puedes poner el logo como texto provisorio si el link está vacío */
        .logo-placeholder {
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
        }

        h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .module-badge {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* CONTENEDOR PRINCIPAL */
        main {
            flex: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .game-view {
            display: none;
            width: 100%;
            animation: fadeIn 0.4s ease-out;
        }

        .game-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ESTILOS: MÓDULO MEMORIA (MEMOTEST) */
        .memo-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            perspective: 1000px;
        }

        .memo-card {
            width: 100%;
            aspect-ratio: 1 / 1.2;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .memo-card.flipped { transform: rotateY(180deg); }
        .memo-card.matched {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.6;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .card-front {
            background: var(--surface);
            border: 2px solid var(--primary-light);
            color: var(--primary);
            font-size: 28px;
        }

        .card-back {
            background: var(--surface);
            border: 2px solid var(--success);
            transform: rotateY(180deg);
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .card-icon { font-size: 24px; margin-bottom: 5px; }

        /* ESTILOS: MÓDULO INSPECTOR (SIMULADOR) */
        .insp-progress {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .insp-display {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            box-shadow: var(--shadow);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        .insp-display::before {
            content: 'MUESTRA EN ANÁLISIS';
            position: absolute;
            top: -10px;
            background: var(--primary);
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .insp-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-action {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 15px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .btn-action:active { transform: scale(0.96); }
        
        .insp-feedback {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            min-height: 40px;
        }

        /* PANTALLA COMÚN DE VICTORIA */
        .victory-screen {
            display: none;
            text-align: center;
            background: var(--surface);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--success-light);
            animation: fadeIn 0.4s ease-out;
        }

        .btn-restart {
            margin-top: 20px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }

        /* BOTÓN FLOTANTE (FAB) */
        .fab {
            position: fixed;
            bottom: 60px; /* Espacio para el footer */
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 100;
            transition: transform 0.2s;
        }

        .fab:active { transform: scale(0.9); }

        /* FOOTER DE AGENCIA */
        footer {
            width: 100%;
            text-align: center;
            padding: 15px;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        footer span {
            font-weight: 700;
            color: var(--primary);
        }

    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <div class="logo-placeholder">🔬 FOODCHECK</div>
        </div>
        <h1>Control de Inocuidad</h1>
        <div class="module-badge" id="module-title">Módulo: Memoria</div>
    </header>

    <main>
        <section id="view-memotest" class="game-view active">
            <div class="memo-board" id="memo-board"></div>
            <div class="victory-screen" id="memo-victory">
                <h2 style="color: var(--success); margin-bottom: 10px;">¡Análisis Completado!</h2>
                <p>Has emparejado todos los criterios de calidad.</p>
                <button class="btn-restart" onclick="initMemotest()">Reiniciar Módulo</button>
            </div>
        </section>

        <section id="view-inspector" class="game-view">
            <div id="insp-gameplay">
                <div class="insp-progress" id="insp-progress">Lote 1 / 6</div>
                <div class="insp-display" id="insp-display">Cargando muestra...</div>
                <div class="insp-actions" id="insp-actions"></div>
                <div class="insp-feedback" id="insp-feedback"></div>
            </div>
            <div class="victory-screen" id="insp-victory">
                <h2 style="color: var(--primary); margin-bottom: 10px;">¡Turno Finalizado!</h2>
                <p id="insp-final-msg"></p>
                <button class="btn-restart" onclick="initInspector()">Siguiente Turno</button>
            </div>
        </section>
    </main>

    <button class="fab" id="switch-btn" onclick="toggleGame()" title="Cambiar Simulador">
        🔄
    </button>

    <footer>
        Powered by <span>NovaBit Media Agency</span>
    </footer>

    <script>
        // --- CONTROLADOR GENERAL ---
        let currentMode = 'memotest';
        const viewMemo = document.getElementById('view-memotest');
        const viewInsp = document.getElementById('view-inspector');
        const moduleTitle = document.getElementById('module-title');

        function toggleGame() {
            if (currentMode === 'memotest') {
                currentMode = 'inspector';
                viewMemo.classList.remove('active');
                viewInsp.classList.add('active');
                moduleTitle.innerText = "Módulo: Inspección Rápida";
                initInspector();
            } else {
                currentMode = 'memotest';
                viewInsp.classList.remove('active');
                viewMemo.classList.add('active');
                moduleTitle.innerText = "Módulo: Memoria";
                initMemotest();
            }
        }

        // --- LÓGICA DEL MEMOTEST ---
        const memoData = [
            { id: 1, text: "Frutillas y Uvas", icon: "🍓" }, { id: 1, text: "Requieren Refrigeración", icon: "❄️" },
            { id: 2, text: "Banana o Papa", icon: "🍌" }, { id: 2, text: "Temperatura Ambiente", icon: "🌡️" },
            { id: 3, text: "Primera Calidad", icon: "⭐" }, { id: 3, text: "Aptos Venta Directa", icon: "🛒" },
            { id: 4, text: "Tercera Calidad", icon: "⚠️" }, { id: 4, text: "Industria o Descarte", icon: "🗑️" },
            { id: 5, text: "Transporte", icon: "🚚" }, { id: 5, text: "Limpios y Cerrados", icon: "🧼" },
            { id: 6, text: "Contaminación Cruzada", icon: "🦠" }, { id: 6, text: "Afecta a Productos Sanos", icon: "❌" }
        ];

        let hasFlippedCard = false, lockBoard = false;
        let firstCard, secondCard;
        let memoMatches = 0;

        function initMemotest() {
            const board = document.getElementById('memo-board');
            document.getElementById('memo-victory').style.display = 'none';
            board.style.display = 'grid';
            board.innerHTML = '';
            memoMatches = 0;
            [hasFlippedCard, lockBoard, firstCard, secondCard] = [false, false, null, null];

            let shuffled = [...memoData].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('memo-card');
                card.dataset.id = data.id;
                card.innerHTML = `
                    <div class="card-face card-front">🔬</div>
                    <div class="card-face card-back">
                        <div class="card-icon">${data.icon}</div>
                        <div>${data.text}</div>
                    </div>
                `;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard || this === firstCard) return;
            this.classList.add('flipped');
            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }
            secondCard = this;
            checkMemoMatch();
        }

        function checkMemoMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;
            if (isMatch) {
                setTimeout(() => {
                    firstCard.classList.add('matched');
                    secondCard.classList.add('matched');
                    resetMemoBoard();
                    memoMatches += 2;
                    if (memoMatches === memoData.length) {
                        document.getElementById('memo-board').style.display = 'none';
                        document.getElementById('memo-victory').style.display = 'block';
                    }
                }, 400);
            } else {
                lockBoard = true;
                setTimeout(() => {
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    resetMemoBoard();
                }, 1000);
            }
        }

        function resetMemoBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        // --- LÓGICA DEL SIMULADOR DE INSPECTOR ---
        const inspItems = [
            { text: "Llegan cajones de frutillas frescas.", options: ["Refrigerar", "Temp. Ambiente"], correct: 0, exp: "Las frutillas requieren cadena de frío." },
            { text: "Lote de manzanas de tamaño perfecto y color brillante.", options: ["1ra Calidad", "3ra Calidad"], correct: 0, exp: "Óptimas para venta directa." },
            { text: "Hortalizas con daños visibles por golpes severos.", options: ["Segunda Calidad", "Descarte / Industria"], correct: 1, exp: "Riesgo de deterioro avanzado." },
            { text: "Llega transporte cerrado pero con interior sucio.", options: ["Aceptar", "Rechazar"], correct: 1, exp: "La limpieza es innegociable." },
            { text: "Almacenaje de vegetales limpios junto a carnes crudas.", options: ["Permitido", "Riesgo Cruzado"], correct: 1, exp: "Genera contaminación cruzada inminente." },
            { text: "Bolsas de papa llegando del campo.", options: ["Refrigerar", "Temp. Ambiente"], correct: 1, exp: "La papa no requiere refrigeración." }
        ];

        let currentInsp = 0;
        let inspScore = 0;
        let inspActive = true;

        function initInspector() {
            document.getElementById('insp-gameplay').style.display = 'block';
            document.getElementById('insp-victory').style.display = 'none';
            currentInsp = 0;
            inspScore = 0;
            loadInspItem();
        }

        function loadInspItem() {
            if (currentInsp >= inspItems.length) {
                endInspector();
                return;
            }
            const item = inspItems[currentInsp];
            document.getElementById('insp-display').innerText = item.text;
            document.getElementById('insp-progress').innerText = `Muestra ${currentInsp + 1} de ${inspItems.length}`;
            document.getElementById('insp-feedback').innerHTML = '';
            
            const actionsDiv = document.getElementById('insp-actions');
            actionsDiv.innerHTML = '';
            item.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-action';
                btn.innerText = opt;
                btn.onclick = () => checkInspAnswer(index, btn);
                actionsDiv.appendChild(btn);
            });
            inspActive = true;
        }

        function checkInspAnswer(index, btnSelected) {
            if (!inspActive) return;
            inspActive = false;
            
            const item = inspItems[currentInsp];
            const btns = document.querySelectorAll('.btn-action');
            const feedback = document.getElementById('insp-feedback');

            if (index === item.correct) {
                btnSelected.style.borderColor = "var(--success)";
                btnSelected.style.backgroundColor = "var(--success-light)";
                feedback.innerHTML = `<span style="color:var(--success)">✓ Correcto:</span> ${item.exp}`;
                inspScore++;
            } else {
                btnSelected.style.borderColor = "var(--danger)";
                btnSelected.style.backgroundColor = "var(--danger-light)";
                btns[item.correct].style.borderColor = "var(--success)";
                feedback.innerHTML = `<span style="color:var(--danger)">✗ Error:</span> ${item.exp}`;
            }

            setTimeout(() => {
                currentInsp++;
                loadInspItem();
            }, 2500);
        }

        function endInspector() {
            document.getElementById('insp-gameplay').style.display = 'none';
            document.getElementById('insp-victory').style.display = 'block';
            const msg = document.getElementById('insp-final-msg');
            msg.innerText = `Precisión del control: ${inspScore} / ${inspItems.length} muestras analizadas correctamente.`;
        }

        // Inicializar el primer juego al cargar
        initMemotest();
    </script>
</body>
</html>
