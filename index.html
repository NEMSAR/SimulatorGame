<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conexiones del Abasto</title>
    <style>
        /* Estilos Premium y Variables */
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --card-border: rgba(255, 255, 255, 0.2);
            --accent: #38bdf8;
            --success: #34d399;
            --text-main: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, var(--bg-color));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            background: -webkit-linear-gradient(45deg, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        p { color: #94a3b8; font-size: 14px; }

        /* Contenedor del Tablero */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 500px;
            width: 100%;
            perspective: 1000px; /* Necesario para el efecto 3D */
        }

        /* Estructura de la Tarjeta */
        .card {
            width: 100%;
            aspect-ratio: 1 / 1.2;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg) scale(0.95);
            opacity: 0.8;
            pointer-events: none;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Frente de la tarjeta (Oculto) */
        .card-front {
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            font-size: 40px;
            color: var(--accent);
            transition: box-shadow 0.3s ease;
        }

        .card:hover .card-front {
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            border-color: rgba(56, 189, 248, 0.5);
        }

        /* Dorso de la tarjeta (Revelado) */
        .card-back {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            transform: rotateY(180deg);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            border-color: var(--accent);
        }

        .card.matched .card-back {
            border-color: var(--success);
            box-shadow: 0 0 20px rgba(52, 211, 153, 0.4);
        }

        /* Pantalla de Victoria */
        .victory-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 100;
        }

        .victory-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        .victory-content {
            transform: scale(0.8);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .victory-screen.active .victory-content {
            transform: scale(1);
        }

        .btn-restart {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(45deg, var(--accent), #3b82f6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
        }

        /* Animaciones clave */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h1>Conexiones del Abasto</h1>
        <p>Encuentra los pares correctos para organizar el mercado</p>
    </header>

    <div class="game-board" id="board">
        <!-- Las tarjetas se generan mediante JavaScript -->
    </div>

    <div class="victory-screen" id="victory">
        <div class="victory-content">
            <h1 style="font-size: 40px; margin-bottom: 10px;">¡Excelente!</h1>
            <p style="font-size: 18px; color: var(--text-main);">Dominas las reglas del mercado de abasto.</p>
            <button class="btn-restart" onclick="initGame()">Jugar de nuevo</button>
        </div>
    </div>

    <script>
        // Pares basados en el documento de capacitación
        const cardData = [
            { id: 1, text: "Frutillas y uvas" },
            { id: 1, text: "Necesitan refrigeración" },
            { id: 2, text: "Banana o papa" },
            { id: 2, text: "Temperatura ambiente" },
            { id: 3, text: "Primera calidad" },
            { id: 3, text: "Venta directa" },
            { id: 4, text: "Tercera calidad" },
            { id: 4, text: "Industria o descarte" },
            { id: 5, text: "Transporte" },
            { id: 5, text: "Limpios y cerrados" },
            { id: 6, text: "Contaminación cruzada" },
            { id: 6, text: "Afecta a productos sanos" }
        ];

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchesFound = 0;

        const board = document.getElementById('board');
        const victoryScreen = document.getElementById('victory');

        function shuffle() {
            cardData.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            board.innerHTML = '';
            shuffle();
            
            cardData.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = data.id;

                card.innerHTML = `
                    <div class="card-face card-front">
                        <span>📦</span>
                    </div>
                    <div class="card-face card-back">
                        <span>${data.text}</span>
                    </div>
                `;

                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.id === secondCard.dataset.id;

            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            // Añadir clase match para efecto visual de acierto
            setTimeout(() => {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                resetBoard();
                
                matchesFound += 2;
                if (matchesFound === cardData.length) {
                    setTimeout(() => showVictory(), 500);
                }
            }, 400); // Pequeño retraso para que el usuario lea la segunda tarjeta
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1200); // 1.2 segundos para memorizar
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function showVictory() {
            victoryScreen.classList.add('active');
        }

        function initGame() {
            matchesFound = 0;
            victoryScreen.classList.remove('active');
            resetBoard();
            createBoard();
        }

        // Iniciar el juego al cargar la página
        initGame();
    </script>
</body>
</html>
